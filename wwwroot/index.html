<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportation Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Modern Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bx bxs-truck me-2"></i>
                TransportApp
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            <i class="bx bxs-dashboard me-1"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="fleet.html">
                            <i class="bx bxs-truck me-1"></i>
                            Fleet
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="route.html">
                            <i class="bx bxs-map me-1"></i>
                            Routes
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Overview Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card stat-card primary">
                    <div class="card-body">
                        <i class="bx bxs-truck icon"></i>
                        <div class="stat-label">Total Fleets</div>
                        <div class="stat-value" id="totalFleets">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card success">
                    <div class="card-body">
                        <i class="bx bxs-map icon"></i>
                        <div class="stat-label">Active Routes</div>
                        <div class="stat-value" id="totalRoutes">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card warning">
                    <div class="card-body">
                        <i class="bx bxs-pie-chart-alt-2 icon"></i>
                        <div class="stat-label">Fleet Utilization</div>
                        <div class="stat-value" id="fleetUtilization">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Route Summary -->
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="card-title mb-0">
                        <i class="bx bxs-map-alt me-2"></i>
                        Route Summary
                    </h5>
                    <a href="route.html" class="btn btn-primary btn-sm">
                        <i class="bx bx-plus me-1"></i>
                        Add Route
                    </a>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Route Name</th>
                                <th>Origin</th>
                                <th>Destination</th>
                                <th>Assigned Fleets</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="routeSummaryTable">
                            <!-- Data will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
